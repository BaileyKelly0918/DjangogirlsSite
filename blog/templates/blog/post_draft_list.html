{% extends 'blog/base.html' %}

{% block content %}
    <h2>Draft Posts</h2>

    {% for post in posts %}
        <div class="post">
            <p>created: {{ post.created_date }}</p>
            <h2>
                <a href="{% url 'post_detail' pk=post.pk %}">
                    {{ post.title }}
                </a>
            </h2>
            <p>{{ post.text|linebreaksbr }}</p>
        </div>
    {% empty %}
        <p>No draft posts yet.</p>
    {% endfor %}
{% endblock %}
